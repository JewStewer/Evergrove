<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evergrove Ledger</title>
    <script>
      // Global error handler to catch and suppress the 'fetch' getter error
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.indexOf('fetch of #<Window>') !== -1 ||
          event.message.indexOf('Cannot set property fetch') !== -1
        )) {
          console.warn("Muted benign fetch override error:", event.message);
          event.preventDefault();
          event.stopPropagation();
          return true;
        }
      }, true);

      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return fetchValue; },
            set: function(val) { fetchValue = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to patch fetch getter:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
